<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="85.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
            font-family: poppins;
            
        }
        body{
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url("123.jpg");
            background-position:center ;
            background-repeat: no-repeat;
            background-size: cover; 
        }
        
        h2{
            color: black;
            text-shadow:white 10px;
        }
       
.login-box{
    width:350px;
    padding:40px;
    background-color: rgba(255,255,255,0.8);
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
.login-box input{
    padding: 10px;
    border: 1px solid black;
    border-radius: 50px;
    margin: 10px;
    cursor: pointer;
    background-color: rgba(255,255,255,0.1);
    width: 100%;
}

.button-con{
    display: flex;
    justify-content: center;
}
.login-box button{
   border: 2pxblack;
   cursor: pointer;
}
.login-box{
    transition: transform 0.3s;
}

.login-box:hover{
    transform: scale(1.05);
}
.login-box input{
    transition: transform 0.3s;
}

.login-box input:hover{
    transform: scale(1.05);
}
button{
    transition: transform 0.3s;
}

button:hover{
    transform: scale(1.1);
}
button{
    border-radius: 50px;
}

    </style>
</head>
<body>
    <script>
function login(){

let empId = document.getElementById("emp_id").value;
let password = document.getElementById("pas").value;

if(empId === "dakshata@ceo" && password === "05145253"){
    
    window.location.href = "page.html";

}
else{
    alert("Invalid Employee ID or Password");
}

}
</script>
<div class="login-box">
<form>
    <h2 style="text-align: center;">LOGIN</h2><br>
    Employee ID: <input type="text" id="emp_id" placeholder="Employee ID"><br>
    Password: <input type="password" id="pas" placeholder="Password"><br>
   <br>
   <div class="button-con">
    <button type="button" style="padding: 5px;" onclick="login()">LOGIN</button></div>
</form>
</div>
</body>
</html>
